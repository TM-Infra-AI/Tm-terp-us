name: Deploy to t-erp.us (via SCP)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 22999 -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SCP
        run: |
          # 1. Runner me se extra files delete karein taaki wo cPanel pe na jayein
          # Isme hum t_erp_key ko bhi delete kar rahe hain taaki wo server pe na jaye
          shopt -s dotglob
          rm -rf .git .github etc logs mail images public_ftp ssl tmp access-logs *.zip t_erp_key*
          
          # 2. Files ko cPanel ke target folder (~/t-erp.us/) me bhej dein
          # Port 22999 aur Capital -P use kiya hai
          scp -P 22999 -v -q -r * ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/t-erp.us/
